      <FullLP />

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// スクロールで要素がふわっと出てくる演出
setTimeout(() => {
  const root = document.getElementById('root');
  if (!root) return;
  const wrapper = root.firstElementChild;
  if (!wrapper) return;
  // 固定ヘッダーを除外し、ヒーロー以降の帯ごとに「中身の要素」だけを出現させる
  const bands = Array.from(wrapper.children).filter((el) => getComputedStyle(el).position !== 'fixed');
  // ヒーロー（先頭）とフッター（末尾）はアニメーション対象外
  const sectionBands = bands.slice(1, -1);
  const io = new IntersectionObserver((entries) => {
    entries.forEach((e) => {
      if (e.isIntersecting) {
        const d = e.target.dataset.revDelay || 0;
        e.target.style.transitionDelay = d + 'ms';
        e.target.classList.add('in');
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -10% 0px' });

  sectionBands.forEach((band) => {
    // 帯の中で「意味のある中身」を拾う（背景装飾のpointer-events:noneは除外）
    const inner = band.querySelector('[style*="max-width"]') || band;
    const kids = Array.from(inner.children).filter((el) => {
      const cs = getComputedStyle(el);
      return cs.position !== 'absolute' && cs.pointerEvents !== 'none' && el.offsetHeight > 0;
    });
    const items = kids.length ? kids : [inner];
    items.forEach((el, i) => {
      el.classList.add('reveal');
      el.dataset.revDelay = i % 4 * 90;
      io.observe(el);
    });
  });

  // 比較表の行を上から順に表示
  const cmpIo = new IntersectionObserver((entries) => {
    entries.forEach((e) => {
      if (e.isIntersecting) {
        const r = parseInt(e.target.dataset.cmprow || 0, 10);
        e.target.style.transitionDelay = r * 110 + 'ms';
        e.target.classList.add('in');
        cmpIo.unobserve(e.target);
      }
    });
  }, { threshold: 0.2 });
  document.querySelectorAll('.cmp-row').forEach((el) => cmpIo.observe(el));

  // セクション見出しの下線を伸ばす
  const ulIo = new IntersectionObserver((entries) => {
    entries.forEach((e) => {
      if (e.isIntersecting) {e.target.classList.add('in');ulIo.unobserve(e.target);}
    });
  }, { threshold: 0.6 });
  document.querySelectorAll('.underline-grow').forEach((el) => ulIo.observe(el));

  // スクロール進捗バー
  const bar = document.getElementById('scroll-progress');
  if (bar) {
    const onScroll = () => {
      const h = document.documentElement.scrollHeight - window.innerHeight;
      const p = h > 0 ? window.scrollY / h * 100 : 0;
      bar.style.width = p + '%';
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll, { passive: true });
    onScroll();
  }
}, 150);
</script>
</body>
</html>
