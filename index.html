<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Plusra フルLPワイヤー</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #E7ECF3; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// wf-kit.jsx — Plusra LP wireframe kit, themed to the Plusra Design System
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
(function () {
const WF = {
  canvas:  '#E7ECF3',
  card:    '#FFFFFF',
  card2:   '#F8FAFC',
  panel:   '#F8FAFC',
  panel2:  '#F1F5F9',
  line:    '#E2E8F0',
  line2:   '#CBD5E1',
  ink:     '#0F172A',
  ink2:    '#334155',
  ink3:    '#64748B',
  ink4:    '#94A3B8',
  accent:   '#1961D5',
  accent2:  '#56B8E8',
  accentDk: '#144BB0',
  accentSoft: '#EFF6FF',
  accentSoft2:'#DBEAFE',
  accentLine: '#8DB8FF',
  grad: 'linear-gradient(135deg, #1961D5 0%, #56B8E8 100%)',
  gradDeep: 'linear-gradient(160deg, #0E3A9A 0%, #1961D5 60%, #3E86E0 100%)',
  washTop:  'linear-gradient(180deg, #FFFFFF 0%, #EEF4FF 100%)',
  washBlue: 'linear-gradient(180deg, #EEF4FF 0%, #DCE9FE 100%)',
  washSoft: 'linear-gradient(180deg, #F8FAFF 0%, #FFFFFF 100%)',
  heroWash: 'radial-gradient(120% 90% at 80% 0%, #DCEAFE 0%, #EEF4FF 40%, #FFFFFF 75%)',
  glass:    'rgba(255,255,255,0.65)',
  yel:     '#F5B82E',
  yelGrad: 'linear-gradient(135deg, #EF9C0C 0%, #FED51E 100%)',
  ok:      '#2ECA8B', okSoft: '#E1F8ED',
  warn:    '#F58733', warnSoft: '#FEF0E6',
  danger:  '#F05252', dangerSoft: '#FEECEE',
  sans: '"gothic-mb101", "Gothic MB101", "ゴシックMB101", "Zen Kaku Gothic New", system-ui, -apple-system, sans-serif',
  mono: 'ui-monospace, "SF Mono", Menlo, monospace',
  radius: 12,
};

function Spec({ children, accent, style }) {
  return (
    <span style={{
      fontFamily: WF.mono, fontSize: 10.5, letterSpacing: 0.2, lineHeight: 1.3,
      padding: '3px 6px', borderRadius: 4, whiteSpace: 'nowrap',
      color: accent ? WF.accent : WF.ink3,
      background: accent ? WF.accentSoft : WF.panel2,
      border: `1px solid ${accent ? WF.accentLine : WF.line}`,
      ...style,
    }}>{children}</span>
  );
}

function Eyebrow({ children, style }) {
  return (
    <div style={{
      fontFamily: WF.mono, fontSize: 11, letterSpacing: 2, textTransform: 'uppercase',
      fontWeight: 600, color: WF.accent, ...style,
    }}>{children}</div>
  );
}

function Line({ w = '100%', h = 9, c, style }) {
  return <div style={{ width: w, height: h, borderRadius: h / 2, background: c || WF.line, ...style }} />;
}

function Lines({ n = 3, w = ['100%','94%','72%'], gap = 9, h = 8, c, style }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap, ...style }}>
      {Array.from({ length: n }).map((_, i) => (
        <Line key={i} w={Array.isArray(w) ? (w[i] ?? w[w.length-1]) : w} h={h} c={c} />
      ))}
    </div>
  );
}

function Box({ children, style, pad = 0, fill = true }) {
  return (
    <div style={{
      border: `1px solid ${WF.line}`, borderRadius: 14,
      background: fill ? WF.card : 'transparent', padding: pad,
      boxShadow: fill ? '0 1px 2px rgba(15,23,42,0.04)' : 'none',
      ...style,
    }}>{children}</div>
  );
}

function Img({ label = 'image', h = 160, w = '100%', radius = 12, style }) {
  return (
    <div style={{
      width: w, height: h, borderRadius: radius, position: 'relative', overflow: 'hidden',
      border: `1px dashed ${WF.line2}`,
      background: `repeating-linear-gradient(135deg, #EFF3F8 0 10px, #F8FAFC 10px 20px)`,
      display: 'flex', alignItems: 'center', justifyContent: 'center', ...style,
    }}>
      <span style={{
        fontFamily: WF.mono, fontSize: 11, color: WF.ink3, letterSpacing: 0.3,
        padding: '4px 9px', border: `1px solid ${WF.line}`, borderRadius: 6,
        background: WF.card, textAlign: 'center',
      }}>{label}</span>
    </div>
  );
}

function Btn({ children, solid, w, sub, style }) {
  return (
    <div style={{ display: 'inline-flex', flexDirection: 'column', alignItems: 'center', gap: 7 }}>
      <div style={{
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        height: 48, width: w, padding: '0 28px', borderRadius: 999,
        fontFamily: WF.sans, fontSize: 15, fontWeight: 700, letterSpacing: 0.2,
        color: solid ? '#FFFFFF' : WF.accent,
        background: solid ? WF.grad : WF.card,
        border: solid ? 'none' : `1.5px solid ${WF.accentLine}`,
        boxShadow: solid ? '0 6px 18px rgba(25,97,213,0.28)' : 'none',
        ...style,
      }}>{children}</div>
      {sub && <span style={{ fontFamily: WF.sans, fontSize: 11.5, color: WF.ink3 }}>{sub}</span>}
    </div>
  );
}

function Pill({ children, accent, tone, style }) {
  const map = {
    ok:     [WF.okSoft, '#137A51', '#8BE6C1'],
    warn:   [WF.warnSoft, '#A34A0B', '#FDBA8C'],
    danger: [WF.dangerSoft, '#A62626', '#FCA5A5'],
  };
  const [bg, fg, bd] = tone ? map[tone]
    : accent ? [WF.accentSoft, WF.accent, WF.accentLine]
    : [WF.panel2, WF.ink2, WF.line];
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      fontFamily: WF.sans, fontSize: 12, fontWeight: 600, lineHeight: 1,
      padding: '6px 12px', borderRadius: 999,
      color: fg, background: bg, border: `1px solid ${bd}`, ...style,
    }}>{children}</span>
  );
}

function Check({ c, size = 14 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 14 14" fill="none" stroke={c || WF.accent} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M2 7.5L5.5 11L12 3.5" />
    </svg>
  );
}

function Cross({ c, size = 13 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 13 13" fill="none" stroke={c || WF.ink4} strokeWidth="1.8" strokeLinecap="round">
      <path d="M3 3l7 7M10 3l-7 7" />
    </svg>
  );
}

function Avatar({ size = 36 }) {
  return <div style={{ width: size, height: size, borderRadius: '50%', background: WF.panel2, border: `1px solid ${WF.line}`, flexShrink: 0 }} />;
}

function Browser({ children, label, style }) {
  return (
    <div style={{ width: '100%', height: '100%', background: WF.card, display: 'flex', flexDirection: 'column', fontFamily: WF.sans, ...style }}>
      <div style={{ height: 38, flexShrink: 0, display: 'flex', alignItems: 'center', gap: 14, padding: '0 16px', borderBottom: `1px solid ${WF.line}`, background: WF.card2 }}>
        <div style={{ display: 'flex', gap: 7 }}>
          {['#E2E8F0','#E2E8F0','#E2E8F0'].map((c,i)=><div key={i} style={{ width: 11, height: 11, borderRadius: '50%', background: c }} />)}
        </div>
        <div style={{ flex: 1, maxWidth: 360, height: 22, borderRadius: 6, background: WF.card, border: `1px solid ${WF.line}`, display: 'flex', alignItems: 'center', padding: '0 10px' }}>
          <span style={{ fontFamily: WF.mono, fontSize: 11, color: WF.ink3 }}>{label || 'plusra.app'}</span>
        </div>
      </div>
      <div style={{ flex: 1, overflow: 'hidden' }}>{children}</div>
    </div>
  );
}

function Logo({ height = 30, color = WF.ink, symbolColor, textColor, gap, gradient, gradientSymbol }) {
  const gid = React.useId().replace(/:/g, '');
  const sFill = (gradient || gradientSymbol) ? `url(#${gid}-s)` : (symbolColor || color);

    <div style={{ display: 'flex', alignItems: 'center', gap: gap != null ? gap : height * 0.42 }}>

        <defs><linearGradient id={`${gid}-s`} x1="0" y1="0" x2="1" y2="1"><stop offset="0" stopColor="#1961D5" /><stop offset="1" stopColor="#56B8E8" /></linearGradient></defs>

        <path d="M188.2,250.1c-1.69,0-3.38.01-5.06.04l37.59-59.43c14.98-20.88,38.22-12.53,59.9-14.34,26.65-3.02,41.92-21.52,45.29-41.97l.27-1.63c-14.64,105.84-114.24,116.63-137.99,117.33Z"></path>
      </svg>
      <svg viewBox="0 0 808.42 206.12" style={{ height: height * 0.64, display: 'block' }} fill={tFill}>

        <path d="M216.62,5.83l-23.31,193.66c-.18,1.54-1.49,2.69-3.03,2.69h-22.78c-1.83,0-3.25-1.6-3.03-3.42L187.9,5.1c.19-1.53,1.49-2.69,3.03-2.69h22.65c1.83,0,3.25,1.6,3.03,3.42Z"></path>

      </svg>
    </div>
  );
}

function NavBar({ compact }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: compact ? '0 20px' : '0 40px', height: 54, borderBottom: `1px solid ${WF.line}`, background: 'linear-gradient(180deg, #FFFFFF 0%, #F9FAFB 100%)' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
        <div style={{ width: 26, height: 26, borderRadius: 8, background: WF.grad }} />
        <span style={{ fontFamily: WF.sans, fontWeight: 800, fontSize: 13, color: WF.ink }}>Plusra</span>
      </div>
      {!compact && (
        <div style={{ display: 'flex', gap: 28, marginLeft: 'auto', marginRight: 24 }}>
          {['導入事例','お役立ち資料','サポート','お問い合わせ'].map(t => <span key={t} style={{ fontFamily: WF.sans, fontSize: 12, fontWeight: 500, letterSpacing: 0.2, color: WF.ink2 }}>{t}</span>)}
        </div>
      )}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <div style={{ height: 34, padding: '0 16px', borderRadius: 6, background: WF.grad, color: '#fff', fontFamily: WF.sans, fontWeight: 700, fontSize: 12, display: 'flex', alignItems: 'center', boxShadow: '0 2px 8px rgba(25,97,213,0.20)' }}>法人向け製品資料</div>
      </div>
    </div>
  );
}

function Phone({ children, w = 330, label, style }) {
  return (
    <div style={{ width: w, borderRadius: 34, padding: 9, background: '#0F172A', boxShadow: '0 12px 40px rgba(15,23,42,0.22)', ...style }}>
      <div style={{ borderRadius: 26, overflow: 'hidden', background: WF.card, position: 'relative' }}>
        <div style={{ height: 34, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 20px', position: 'relative' }}>
          <span style={{ fontFamily: WF.sans, fontSize: 11, fontWeight: 600, color: WF.ink2 }}>9:41</span>
          <div style={{ position: 'absolute', left: '50%', top: 9, transform: 'translateX(-50%)', width: 64, height: 18, borderRadius: 999, background: '#0F172A' }} />
          <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
            <div style={{ width: 16, height: 9, borderRadius: 2, border: `1px solid ${WF.ink4}` }} />
          </div>
        </div>
        {children}
      </div>
    </div>
  );
}

function MacBook({ children, w = 980, h = 680, style }) {
  return (
    <div style={{ position: 'relative', ...style }}>
      <div style={{
        width: w,
        borderRadius: '20px 20px 16px 16px',
        padding: '14px 12px 16px 12px',
        background: '#1a1a1a',
        boxShadow: '0 30px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(0,0,0,0.1)',
      }}>
        <div style={{
          width: '100%',
          height: h,
          borderRadius: '12px',
          overflow: 'hidden',
          background: WF.card,
          border: '1px solid rgba(0,0,0,0.05)',
        }}>
          {children}
        </div>
      </div>
      <div style={{
        position: 'absolute',
        bottom: 0,
        left: '50%',
        transform: 'translateX(-50%)',
        width: '28%',
        height: 12,
        background: '#1a1a1a',
        borderRadius: '0 0 16px 16px',
        zIndex: 1,
      }} />
    </div>
  );
}

function BlockTab({ n, title, intent }) {
  return (
    <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 4 }}>
